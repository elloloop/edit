name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            gui: true
          - target: x86_64-apple-darwin
            os: macos-latest
            gui: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            gui: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            gui: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install GUI dependencies (Linux)
        if: matrix.gui && startsWith(matrix.os, 'ubuntu')
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev libgtk-3-dev libglib2.0-dev libatk1.0-dev \
            libcairo2-dev libpango1.0-dev libgdk-pixbuf2.0-dev

      - name: Build TUI
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }} -p edit

      - name: Build GUI
        if: matrix.gui
        run: cargo build --release --target ${{ matrix.target }} -p edit-gui

      - name: Strip and rename binaries
        run: |
          STRIP_CMD="strip"
          if [[ "${{ matrix.target }}" == "aarch64-unknown-linux-gnu" ]]; then
            STRIP_CMD="aarch64-linux-gnu-strip"
          fi

          $STRIP_CMD "target/${{ matrix.target }}/release/edit"
          cp "target/${{ matrix.target }}/release/edit" "edit-${{ matrix.target }}"

          if [[ "${{ matrix.gui }}" == "true" ]] && [[ -f "target/${{ matrix.target }}/release/edit-gui" ]]; then
            $STRIP_CMD "target/${{ matrix.target }}/release/edit-gui"
            cp "target/${{ matrix.target }}/release/edit-gui" "edit-gui-${{ matrix.target }}"
          fi

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            edit-${{ matrix.target }}
            edit-gui-${{ matrix.target }}
